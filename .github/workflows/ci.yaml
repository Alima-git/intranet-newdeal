name: CI Pipeline - Branche Dev

on:
  push:
    branches:
      - dev

env:
  IMAGE_NAME: intranet-newdeal
  IMAGE_TAG: latest
  DOCKER_REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  # JOB 1 - Build
  build:
    name: Build Image Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Verify image
        run: |
          docker image ls | grep ${{ env.IMAGE_NAME }}

      - name: Save image
        run: |
          docker save ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -o image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

      - name: Notification email build
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[${{ job.status }}] Build - ${{ github.workflow }}"
          to: moussawade@groupeisi.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Pipeline : ${{ github.workflow }}
            Branche  : ${{ github.ref_name }}
            Statut   : ${{ job.status }}
            Commit   : ${{ github.sha }}

  # JOB 2 - Scan sécurité
  security-scan:
    name: Scan Securite
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Scan vulnerabilites Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"

      - name: Scan secrets Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notification email scan
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[${{ job.status }}] Scan - ${{ github.workflow }}"
          to: moussawade@groupeisi.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Pipeline : ${{ github.workflow }}
            Branche  : ${{ github.ref_name }}
            Statut   : ${{ job.status }}
            Commit   : ${{ github.sha }}

  # JOB 3 - Push Docker Hub
  push:
    name: Push Docker Hub
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push image
        run: |
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Notification email push
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[${{ job.status }}] Push - ${{ github.workflow }}"
          to: moussawade@groupeisi.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Pipeline : ${{ github.workflow }}
            Branche  : ${{ github.ref_name }}
            Statut   : ${{ job.status }}
            Commit   : ${{ github.sha }}